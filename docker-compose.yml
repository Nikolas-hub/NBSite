version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  # Reverse proxy (nginx)
  nginx:
    image: nginx:1.21-alpine
    container_name: nginx
    networks:
      - app-network
    ports:
      - "80:80"
      - "443:443"                # добавляем HTTPS порт
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf   # новый конфиг для прокси на ASP.NET
      #- ./public:/public  #Если вдруг понадобится статика, но сейчас она настроена в Program.cs через asp.net
      - /etc/letsencrypt:/etc/nginx/ssl:ro   # монтируем сертификаты (только чтение)
    depends_on:
      - nbsite
    restart: unless-stopped
    
  # PostgreSQL
  postgres:
    image: postgres:18
    container_name: postgres
    networks:
      - app-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:                      
      - "5432:5432"              
    restart: unless-stopped

  # ASP.NET Core приложение
  nbsite:
    build:
      context: .          # путь к папке с проектом
      dockerfile: Dockerfile
    container_name: nbsite
    networks:
      - app-network
    # ports:                     
      # - "8080:8080"            
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Project__Database__ConnectionString=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    volumes:
      - ./NBSite/wwwroot:/app/wwwroot    
    depends_on:
      - postgres
    restart: unless-stopped


volumes:
  postgres_data:
