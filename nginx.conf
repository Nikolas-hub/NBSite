# HTTP — перенаправляем на HTTPS
server {
    listen 80;
    server_name dentnb.ru www.dentnb.ru medoptnb.ru www.medoptnb.ru;  

    # Всё, что идёт на HTTP, редиректим на HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS сервер
server {
    listen 443 ssl http2;
    server_name dentnb.ru www.dentnb.ru medoptnb.ru www.medoptnb.ru;

    # SSL сертификаты (укажите пути)
    ssl_certificate /etc/nginx/ssl/live/dentnb.ru/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/dentnb.ru/privkey.pem;

    # Современные настройки SSL (можно взять из генератора, например Mozilla SSL)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Gzip настройки (из старого конфига)
    gzip on;
    gzip_static on;
    gzip_proxied any;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;
    gzip_disable "msie6";

    charset utf-8;
    client_max_body_size 50M;

    # Общие настройки прокси
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    access_log off;
    error_log /var/log/nginx/error.log warn;


    # Прокси на ASP.NET Core приложение
    location / {
        proxy_pass http://nbsite:8080;
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
        proxy_read_timeout 180;
    }
}